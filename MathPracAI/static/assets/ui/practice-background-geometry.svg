<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" fill="none">
  <!--
    MathPracAI — Practice screen background geometry
    Static reference asset (animations live in theme.css via CSS classes)
    Colors: #111118 at low opacity on #F7F8FA background
  -->
  <defs>
    <pattern id="pr-dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#111118" fill-opacity="0.1"/>
    </pattern>
    <radialGradient id="pr-fade" cx="55%" cy="45%" r="60%">
      <stop offset="0%"   stop-color="#F7F8FA" stop-opacity="0"/>
      <stop offset="100%" stop-color="#F7F8FA" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- Dot grid -->
  <rect width="900" height="900" fill="url(#pr-dots)"/>

  <!-- Large rings (auth-spin-slow 80s) -->
  <circle cx="820" cy="780" r="380" stroke="#111118" stroke-opacity="0.09" stroke-width="1.5"/>
  <circle cx="820" cy="780" r="295" stroke="#111118" stroke-opacity="0.06" stroke-width="1" stroke-dasharray="7 16"/>

  <!-- Inner dashed ring (auth-spin-rev 45s) -->
  <circle cx="820" cy="780" r="200" stroke="#111118" stroke-opacity="0.07" stroke-width="1" stroke-dasharray="3 20"/>

  <!-- Top-left partial circle (pr-spin-slow 150s) -->
  <circle cx="-20" cy="80" r="180" stroke="#111118" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Diagonal lines (pr-fade-a pulse) -->
  <line x1="0"   y1="900" x2="900" y2="0"   stroke="#111118" stroke-opacity="0.06"  stroke-width="1"/>
  <line x1="-80" y1="900" x2="820" y2="0"   stroke="#111118" stroke-opacity="0.045" stroke-width="1"/>

  <!-- Floating rect A (auth-float-a drift) -->
  <rect x="90" y="250" width="140" height="140" rx="3"
    stroke="#111118" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- Floating rect B rotated (auth-float-b drift) -->
  <rect x="610" y="145" width="100" height="100" rx="2"
    stroke="#111118" stroke-opacity="0.1" stroke-width="1"
    transform="rotate(14 660 195)"/>

  <!-- Floating small square C (auth-float-c drift) -->
  <rect x="288" y="578" width="44" height="44" rx="2"
    stroke="#111118" stroke-opacity="0.11" stroke-width="1"
    transform="rotate(-10 310 600)"/>

  <!-- Math symbols (pr-symbol-a/b/c/d/e drift) -->
  <text x="560" y="720" font-family="Georgia,serif" font-size="120" fill="#111118" fill-opacity="0.06"  font-style="italic">∫</text>
  <text x="60"  y="680" font-family="Georgia,serif" font-size="88"  fill="#111118" fill-opacity="0.055" font-style="italic">∑</text>
  <text x="680" y="380" font-family="Georgia,serif" font-size="72"  fill="#111118" fill-opacity="0.065" font-style="italic">π</text>
  <text x="200" y="820" font-family="Georgia,serif" font-size="52"  fill="#111118" fill-opacity="0.06"  font-style="italic">f(x)</text>
  <text x="750" y="540" font-family="Georgia,serif" font-size="50"  fill="#111118" fill-opacity="0.055" font-style="italic">∞</text>
  <text x="420" y="180" font-family="Georgia,serif" font-size="40"  fill="#111118" fill-opacity="0.06"  font-style="italic">x²</text>
  <text x="90"  y="160" font-family="Georgia,serif" font-size="36"  fill="#111118" fill-opacity="0.055" font-style="italic">Δ</text>

  <!-- Hairline crosses (pr-fade-b/c pulse) -->
  <line x1="490" y1="290" x2="490" y2="308" stroke="#111118" stroke-opacity="0.2"  stroke-width="1.5"/>
  <line x1="481" y1="299" x2="499" y2="299" stroke="#111118" stroke-opacity="0.2"  stroke-width="1.5"/>
  <line x1="740" y1="630" x2="740" y2="646" stroke="#111118" stroke-opacity="0.18" stroke-width="1.5"/>
  <line x1="732" y1="638" x2="748" y2="638" stroke="#111118" stroke-opacity="0.18" stroke-width="1.5"/>
  <line x1="150" y1="480" x2="150" y2="492" stroke="#111118" stroke-opacity="0.16" stroke-width="1.5"/>
  <line x1="144" y1="486" x2="156" y2="486" stroke="#111118" stroke-opacity="0.16" stroke-width="1.5"/>

  <!-- Pulsing dots (auth-pulse-dot-a/b/c breathe) -->
  <circle cx="540" cy="140" r="4"   fill="#111118" fill-opacity="0.25"/>
  <circle cx="110" cy="550" r="3.5" fill="#111118" fill-opacity="0.2"/>
  <circle cx="800" cy="420" r="3"   fill="#111118" fill-opacity="0.18"/>

  <!-- Centre fade for card readability -->
  <rect width="900" height="900" fill="url(#pr-fade)"/>
</svg>
